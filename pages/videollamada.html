<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videollamada | Tutores On-Line</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/estilos.css" />

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    .navbar { background: #1a1d27 !important; border-bottom: 1px solid #2a2d3a; flex-shrink: 0; }

    /* ── Lobby ── */
    #lobbyScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lobby-card {
      background: #1a1d27;
      border: 1.5px solid #2a2d3a;
      border-radius: 20px;
      padding: 40px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .session-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg,#198754,#20a060);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 2rem;
    }
    .lobby-card h4  { font-weight:700; color:#fff; margin-bottom:5px; }
    .lobby-subtitle { color:#aaa; font-size:.88rem; margin-bottom:0; }

    .info-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:18px 0; }
    .info-chip {
      background:#242735; border:1px solid #2a2d3a; border-radius:20px;
      padding:5px 13px; font-size:.78rem; color:#ccc;
      display:inline-flex; align-items:center; gap:5px;
    }
    .info-chip.role-mod  { border-color:#198754; color:#4ade80; background:#0d2b1a; }
    .info-chip.role-part { border-color:#2563b0; color:#93c5fd; background:#0d1a35; }

    .lobby-msg {
      border-radius:10px; padding:10px 14px;
      font-size:.83rem; margin-bottom:14px;
      display:none;
    }
    .lobby-msg.error   { background:#2a1a1a; border:1px solid #dc3545; color:#f8d7da; }
    .lobby-msg.warning { background:#2a2000; border:1px solid #ffc107; color:#ffe082; }
    .lobby-msg.success { background:#0d2b1a; border:1px solid #198754; color:#4ade80; }

    .btn-join-call {
      background: linear-gradient(135deg,#198754,#20a060);
      color:#fff; border:none; border-radius:12px;
      padding:13px 32px; font-size:.95rem; font-weight:600;
      cursor:pointer; width:100%;
      display:inline-flex; align-items:center; justify-content:center; gap:9px;
      transition: opacity .2s, transform .15s;
    }
    .btn-join-call:hover:not(:disabled) { opacity:.9; transform:translateY(-1px); }
    .btn-join-call:disabled { opacity:.45; cursor:default; transform:none; }

    /* ── Sala activa ── */
    #callScreen { flex:1; display:none; flex-direction:column; }

    .call-topbar {
      background:#1a1d27; border-bottom:1px solid #2a2d3a;
      padding:9px 20px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; gap:12px;
    }
    .call-title { font-weight:600; font-size:.92rem; color:#fff; }
    .call-meta  { font-size:.75rem; color:#888; margin-top:1px; }
    .rec-dot {
      width:9px; height:9px; border-radius:50%; background:#dc3545;
      animation: blink 1.2s infinite; flex-shrink:0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    #sessionTimer { font-size:.88rem; font-weight:600; color:#4ade80; font-family:monospace; }

    .role-badge { font-size:.71rem; font-weight:600; padding:3px 10px; border-radius:20px; }
    .role-badge.moderador    { background:#0d2b1a; color:#4ade80; border:1px solid #198754; }
    .role-badge.participante { background:#0d1a35; color:#93c5fd; border:1px solid #2563b0; }

    .btn-leave {
      background:#dc3545; color:#fff; border:none; border-radius:9px;
      padding:7px 16px; font-size:.82rem; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-leave:hover { background:#bb2d3b; }

    #jitsiContainer { flex:1; background:#000; overflow:hidden; min-height:0; }
    #jitsiContainer iframe { width:100%; height:100%; border:none; display:block; }

    @media (max-width:480px) { .lobby-card { padding:28px 18px; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand d-flex align-items-center" href="../index.html">
        <img src="../assets/images/logo/Logo.png" alt="Tutores On-Line"
             style="height:36px;width:auto;" onerror="this.style.display='none'" />
        <span style="font-weight:700;font-size:1rem;color:#fff;margin-left:8px;">Tutores On-Line</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <span id="navUserName" style="font-size:.83rem;color:#aaa;"></span>
        <a id="btnVolver" href="../index.html"
           class="btn btn-sm btn-outline-secondary rounded-pill px-3">← Salir</a>
      </div>
    </div>
  </nav>

  <!-- ══ LOBBY ══ -->
  <div id="lobbyScreen">
    <div class="lobby-card">
      <div class="session-icon">📹</div>
      <h4 id="lobbyTitle">Sesión de Tutoría</h4>
      <p class="lobby-subtitle" id="lobbySubtitle">Verificando sesión…</p>

      <div class="info-row" id="infoRow"></div>

      <div class="lobby-msg" id="lobbyMsg"></div>

      <button class="btn-join-call" id="btnEntrar" disabled onclick="entrarSala()">
        <i class="bi bi-camera-video-fill"></i>
        <span id="btnTxt">Cargando…</span>
      </button>

      <p style="font-size:.71rem;color:#555;margin-top:12px;margin-bottom:0;">
        Al unirte aceptas que la sesión puede ser grabada con fines educativos.
      </p>
    </div>
  </div>

  <!-- ══ SALA ══ -->
  <div id="callScreen">
    <div class="call-topbar">
      <div class="d-flex align-items-center gap-3">
        <span class="rec-dot"></span>
        <div>
          <div class="call-title">Sesión de Tutoría</div>
          <div class="call-meta" id="callMeta"></div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2 gap-sm-3">
        <span id="sessionTimer">00:00</span>
        <span class="role-badge" id="roleBadge"></span>
        <button class="btn-leave" onclick="salirSala()">
          <i class="bi bi-telephone-x"></i> Salir
        </button>
      </div>
    </div>
    <div id="jitsiContainer"></div>
  </div>

  <!-- Scripts: Bootstrap primero, luego api.js, luego lógica inline -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/api.js"></script>

  <script>
  /* ================================================================
     VIDEOLLAMADA – Jitsi Meet
     ================================================================
     La sala se identifica por reserva_id  →  ambos entran a la misma sala.
     El profesor entra como MODERADOR (primer participante en meet.jit.si
     obtiene privilegios de moderador automáticamente).
     El alumno entra como PARTICIPANTE con toolbar reducido.
     ================================================================ */

  /* ── Constantes ── */
  const SB_URL = 'https://dzrgyxqzacnhqbkkdskj.supabase.co';
  const SB_KEY = 'sb_publishable_YmqZU6pgjkLVCLZONTKD2Q_9rfcSAgP';
  const JITSI_DOMAIN = 'meet.jit.si';

  /* ── Estado global ── */
  let jitsiAPI   = null;
  let timerIntvl = null;
  let segundos   = 0;
  let _usuario   = null;   // usuario activo (de localStorage vía api.js)
  let _reserva   = null;   // datos de la reserva

  /* ── Parámetros de URL ── */
  const urlParams = new URLSearchParams(window.location.search);
  const pReserva  = urlParams.get('reserva');   // id de la reserva
  const pTutor    = urlParams.get('tutor');     // usuario_id del tutor

  /* ── Helpers UI ── */
  function showMsg(msg, tipo = 'error') {
    const el = document.getElementById('lobbyMsg');
    el.className = 'lobby-msg ' + tipo;
    el.style.display = 'block';
    el.textContent = msg;
  }
  function hideMsg() {
    document.getElementById('lobbyMsg').style.display = 'none';
  }
  function chip(iconCls, texto, extraCls = '') {
    return `<span class="info-chip ${extraCls}">
              <i class="bi bi-${iconCls}"></i>${texto}
            </span>`;
  }
  function enableBtn(label) {
    const btn = document.getElementById('btnEntrar');
    btn.disabled = false;
    document.getElementById('btnTxt').textContent = label;
  }
  function disableBtn(label) {
    document.getElementById('btnEntrar').disabled = true;
    document.getElementById('btnTxt').textContent = label;
  }

  /* ── Timer ── */
  function startTimer() {
    segundos = 0;
    clearInterval(timerIntvl);
    timerIntvl = setInterval(() => {
      segundos++;
      const m = String(Math.floor(segundos / 60)).padStart(2,'0');
      const s = String(segundos % 60).padStart(2,'0');
      document.getElementById('sessionTimer').textContent = m + ':' + s;
    }, 1000);
  }

  /* ── Nombre de sala por reserva ── */
  function salaId(id) { return 'TutoresOnLine-Sesion-' + id; }

  /* ── Fetch a Supabase ── */
  async function sbFetch(ruta) {
    const r = await fetch(SB_URL + '/rest/v1' + ruta, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    return r.ok ? r.json() : [];
  }

  /* ================================================================
     INICIAR LOBBY
     Llamado directamente (no con DOMContentLoaded) porque los scripts
     están al final del body y el DOM ya está disponible.
     ================================================================ */
  async function iniciarLobby() {

    /* 1. Leer usuario de localStorage (función de api.js) */
    _usuario = (typeof getUsuario === 'function') ? getUsuario() : null;

    /* Mostrar nombre en navbar */
    if (_usuario) {
      document.getElementById('navUserName').textContent =
        '👋 ' + _usuario.nombre.split(' ')[0];
    }

    /* Botón "Salir" → dashboard correcto */
    const esProf = _usuario && _usuario.rol === 'profesor';
    document.getElementById('btnVolver').href =
      esProf ? 'dashboard.html' : 'dashboard_estudiante.html';

    /* 2. Sin parámetros → sala demo */
    if (!pReserva) {
      document.getElementById('lobbyTitle').textContent    = 'Sala de demostración';
      document.getElementById('lobbySubtitle').textContent = 'Sala sin reserva asociada';
      document.getElementById('infoRow').innerHTML =
        chip('shield-check',
          esProf ? '🎓 Moderador (tutor)' : '📚 Participante (alumno)',
          esProf ? 'role-mod' : 'role-part');
      enableBtn(esProf ? 'Iniciar sesión como moderador' : 'Unirse a la sesión');
      return;
    }

    /* 3. Con reserva → verificar en Supabase */
    document.getElementById('lobbySubtitle').textContent = 'Verificando sesión…';

    let reservas = [], tutorInfo = [];
    try {
      [reservas, tutorInfo] = await Promise.all([
        sbFetch('/reservas?id=eq.' + pReserva + '&select=*'),
        pTutor ? sbFetch('/usuarios?id=eq.' + pTutor + '&select=nombre,email') : Promise.resolve([])
      ]);
    } catch(err) {
      showMsg('Error de conexión al cargar la sesión. Comprueba tu internet.');
      return;
    }

    /* Reserva no encontrada */
    if (!Array.isArray(reservas) || reservas.length === 0) {
      showMsg('No se encontró la reserva. Vuelve a tu panel e intenta de nuevo.');
      document.getElementById('lobbySubtitle').textContent = '';
      return;
    }

    _reserva = reservas[0];

    /* Sesión presencial */
    if (_reserva.modalidad !== 'virtual') {
      showMsg('Esta sesión es presencial y no incluye videollamada.', 'warning');
      document.getElementById('lobbySubtitle').textContent = 'Modalidad presencial';
      return;
    }

    /* Control de acceso */
    if (_usuario) {
      const uid   = String(_usuario.id);
      const acceso = String(_reserva.usuario_id) === uid || String(_reserva.tutor_id) === uid;
      if (!acceso) {
        showMsg('No tienes permiso para acceder a esta sesión.');
        document.getElementById('lobbySubtitle').textContent = '';
        return;
      }
    }

    /* Nombres */
    const tutorNombre  = tutorInfo[0]?.nombre || 'Tutor';
    const alumnoNombre = _usuario ? _usuario.nombre : 'Alumno';

    /* Actualizar UI */
    document.getElementById('lobbyTitle').textContent    = 'Sesión de Tutoría';
    document.getElementById('lobbySubtitle').textContent =
      esProf ? 'Con alumno: ' + alumnoNombre : 'Con tutor: ' + tutorNombre;

    const chips = [
      chip('calendar3',    _reserva.fecha.replace(/-/g,'/')),
      chip('clock',        _reserva.hora),
      chip('camera-video', '🎥 Virtual'),
      chip('shield-check',
           esProf ? '🎓 Moderador (tutor)' : '📚 Participante (alumno)',
           esProf ? 'role-mod' : 'role-part'),
    ];
    document.getElementById('infoRow').innerHTML = chips.join('');

    /* Meta para la barra de la sala */
    document.getElementById('callMeta').textContent =
      _reserva.fecha.replace(/-/g,'/') + ' · ' + _reserva.hora + ' · Virtual';

    enableBtn(esProf ? 'Iniciar sesión como moderador' : 'Unirse a la sesión');
  }

  /* ================================================================
     ENTRAR A LA SALA
     ================================================================ */
  function entrarSala() {
    disableBtn('Conectando…');

    const esProf      = _usuario && _usuario.rol === 'profesor';
    const roomName    = pReserva ? salaId(pReserva) : 'TutoresOnLine-Demo-' + Date.now();
    const displayName = _usuario
      ? _usuario.nombre + (esProf ? ' (Tutor)' : ' (Alumno)')
      : 'Invitado';

    /* Cambiar pantallas */
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('callScreen').style.display  = 'flex';

    /* Badge de rol */
    const badge = document.getElementById('roleBadge');
    if (esProf) {
      badge.textContent = '🎓 Moderador';
      badge.className   = 'role-badge moderador';
    } else {
      badge.textContent = '📚 Participante';
      badge.className   = 'role-badge participante';
    }

    startTimer();
    cargarJitsi(roomName, displayName, esProf);
  }

  /* ── Cargar SDK de Jitsi ── */
  function cargarJitsi(roomName, displayName, esProf) {
    if (window.JitsiMeetExternalAPI) {
      crearSala(roomName, displayName, esProf);
      return;
    }
    const s   = document.createElement('script');
    s.src     = 'https://' + JITSI_DOMAIN + '/external_api.js';
    s.onload  = function() { crearSala(roomName, displayName, esProf); };
    s.onerror = function() {
      document.getElementById('callScreen').style.display  = 'none';
      document.getElementById('lobbyScreen').style.display = 'flex';
      showMsg('No se pudo cargar Jitsi Meet. Verifica tu conexión a internet.');
      enableBtn('Reintentar');
    };
    document.head.appendChild(s);
  }

  /* ── Crear sala Jitsi ── */
  function crearSala(roomName, displayName, esProf) {
    const container = document.getElementById('jitsiContainer');
    container.innerHTML = ''; // limpiar si es reintento

    /* Toolbar completo para el moderador */
    const toolbarMod = [
      'microphone','camera','closedcaptions','desktop','fullscreen',
      'fodeviceselection','hangup','chat','recording','sharedvideo',
      'settings','raisehand','videoquality','filmstrip','stats',
      'shortcuts','tileview','select-background','download',
      'mute-everyone','mute-video-everyone','security'
    ];

    /* Toolbar reducido para el alumno */
    const toolbarPart = [
      'microphone','camera','desktop','fullscreen',
      'fodeviceselection','hangup','chat',
      'settings','raisehand','videoquality',
      'filmstrip','tileview','shortcuts'
    ];

    const options = {
      roomName    : roomName,
      parentNode  : container,
      width       : '100%',
      height      : '100%',
      lang        : 'es',

      configOverwrite: {
        subject                 : 'Sesión de Tutoría – Tutores On-Line',
        startWithAudioMuted     : false,
        startWithVideoMuted     : false,
        enableWelcomePage       : false,
        prejoinPageEnabled      : false,
        disableDeepLinking      : true,
        enableNoAudioDetection  : true,
        enableNoisyMicDetection : true,
        toolbarButtons          : esProf ? toolbarMod : toolbarPart,
        remoteVideoMenu: {
          disableKick           : !esProf,
          disableGrantModerator : !esProf,
        },
      },

      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK          : false,
        SHOW_WATERMARK_FOR_GUESTS     : false,
        SHOW_BRAND_WATERMARK          : false,
        DEFAULT_REMOTE_DISPLAY_NAME   : 'Participante',
        APP_NAME                      : 'Tutores On-Line',
        NATIVE_APP_NAME               : 'Tutores On-Line',
        PROVIDER_NAME                 : 'Tutores On-Line',
        HIDE_INVITE_MORE_HEADER       : true,
        TOOLBAR_ALWAYS_VISIBLE        : false,
        DISABLE_JOIN_LEAVE_NOTIFICATIONS: false,
      },

      userInfo: {
        displayName : displayName,
        email       : (_usuario && _usuario.email) ? _usuario.email : '',
      },
    };

    try {
      jitsiAPI = new JitsiMeetExternalAPI(JITSI_DOMAIN, options);
    } catch(err) {
      document.getElementById('callScreen').style.display  = 'none';
      document.getElementById('lobbyScreen').style.display = 'flex';
      showMsg('Error al iniciar la sala: ' + err.message);
      enableBtn('Reintentar');
      return;
    }

    /* Eventos */
    jitsiAPI.addEventListener('videoConferenceJoined', function() {
      /* Reforzar nombre visible */
      jitsiAPI.executeCommand('displayName', displayName);
      if (esProf) {
        /* Desactivar lobby/sala de espera para que el alumno entre directo */
        try { jitsiAPI.executeCommand('toggleLobby', false); } catch(e) {}
      }
    });

    jitsiAPI.addEventListener('readyToClose', function()        { salirSala(); });
    jitsiAPI.addEventListener('videoConferenceLeft', function() { salirSala(); });
  }

  /* ── Salir ── */
  function salirSala() {
    clearInterval(timerIntvl);
    if (jitsiAPI) {
      try { jitsiAPI.dispose(); } catch(e) {}
      jitsiAPI = null;
    }

    const esProf  = _usuario && _usuario.rol === 'profesor';
    const destino = esProf ? 'dashboard.html' : 'dashboard_estudiante.html';

    if (confirm('¿Deseas volver a tu panel?')) {
      window.location.href = destino;
    } else {
      /* Volver al lobby sin recargar */
      document.getElementById('callScreen').style.display  = 'none';
      document.getElementById('lobbyScreen').style.display = 'flex';
      document.getElementById('jitsiContainer').innerHTML  = '';
      segundos = 0;
      document.getElementById('sessionTimer').textContent  = '00:00';
      enableBtn('Volver a la sesión');
    }
  }

  /* ================================================================
     ARRANQUE — llamado directo, no con DOMContentLoaded,
     porque el script está al final del body y el DOM ya está listo.
     ================================================================ */
  iniciarLobby();
  </script>
</body>
</html>
