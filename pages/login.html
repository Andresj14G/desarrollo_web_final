<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Tutores On-Line</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/estilos.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="../index.html">
        <img src="../assets/images/logo/Logo.png" alt="Tutores On-Line" style="height: 42px; width: auto;" />
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="bi bi-list fs-2 text-secondary"></i>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center gap-lg-2 mt-3 mt-lg-0" data-auth-area>
          <li class="nav-item"><a class="nav-link fw-500" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link fw-500" href="Buscar_tutor.html">Buscar profesor</a></li>
          <li class="nav-item"><a class="btn btn-outline-success rounded-pill px-3" href="login.html">Iniciar sesión</a></li>
          <li class="nav-item"><a class="btn btn-success rounded-pill px-3 text-white" href="registro.html">Registrarse</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-page-wrap">
    <div class="auth-card">
      <h2 class="auth-title">Iniciar sesión</h2>
      <p class="auth-subtitle">¿No tiene cuenta? <a href="registro.html">Registrarse</a></p>

      <!-- Mensaje de error/éxito -->
      <div id="loginMsg" style="display:none; background:#fff3cd; border:1px solid #ffc107;
           color:#856404; border-radius:8px; padding:10px 14px; margin-bottom:14px; font-size:14px;"></div>

      <form id="formLogin">
        <input id="loginEmail"    type="email"    class="auth-field" placeholder="Correo electrónico" required />
        <input id="loginPassword" type="password" class="auth-field" placeholder="Contraseña" required />
        <button type="submit" class="auth-btn">Iniciar sesión</button>
      </form>

      <span class="auth-forgot">¿Olvidó la contraseña? <a href="#">Click aquí</a></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/api.js"></script>
</body>
</html>
